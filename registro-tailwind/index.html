<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Registro Usuario</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="assets/css/styles.css">

</head>

<body class="bg-gray-100 flex flex-col min-h-screen">

<!-- NAVBAR -->

<nav class="bg-blue-900 text-white p-4">

<div class="container mx-auto flex justify-between">

<h1 class="text-lg font-bold">
<i class="fa fa-user-plus"></i> Registro Web
</h1>

<div class="space-x-6">

<a href="#" class="hover:text-gray-300">Inicio</a>
<a href="#" class="hover:text-gray-300">Registro</a>
<a href="#" class="hover:text-gray-300">Contacto</a>

</div>

</div>

</nav>

<!-- FORMULARIO -->

<div class="flex-grow flex items-center justify-center">

<div class="w-96">

<h2 class="text-center text-xl font-bold mb-4">
FORMULARIO DE REGISTRO
</h2>

<div class="bg-white rounded-xl shadow-lg overflow-hidden">

<div class="bg-blue-900 text-white text-center p-4">

<h3 class="font-bold text-lg">
REGISTRO DE USUARIO
</h3>

<p class="text-sm">
Por favor, complete los siguientes 5 campos
</p>

</div>

<div class="p-6 space-y-4">

<!-- nombre -->

<div class="flex border rounded">

<span class="p-2 bg-gray-200">
<i class="fa fa-user"></i>
</span>

<input type="text"
placeholder="Escriba su nombre completo"
class="w-full p-2 outline-none">

</div>

<!-- correo -->

<div class="flex border rounded">

<span class="p-2 bg-gray-200">
<i class="fa fa-envelope"></i>
</span>

<input type="email"
placeholder="ejemplo@correo.com"
class="w-full p-2 outline-none">

</div>

<!-- usuario -->

<div class="flex border rounded">

<span class="p-2 bg-gray-200">
<i class="fa fa-tag"></i>
</span>

<input type="text"
placeholder="Cree un nombre único"
class="w-full p-2 outline-none">

</div>

<!-- contraseña -->

<div class="flex border rounded">

<span class="p-2 bg-gray-200">
<i class="fa fa-lock"></i>
</span>

<input type="password"
placeholder="********"
class="w-full p-2 outline-none">

</div>

<!-- ciudad -->

<div class="flex border rounded">

<span class="p-2 bg-gray-200">
<i class="fa fa-location-dot"></i>
</span>

<input type="text"
placeholder="Ingrese su ciudad, ej. Tizayuca"
class="w-full p-2 outline-none">

</div>

<button class="w-full bg-blue-600 text-white py-3 rounded-full font-bold hover:bg-blue-700">

ENVIAR DATOS
<i class="fa fa-arrow-right"></i>

</button>

</div>

</div>

</div>

</div>

<!-- FOOTER -->

<footer class="bg-gray-900 text-white text-center p-4">

<p>
<i class="fa fa-code"></i>
 Desarrollado por Gerardo Silva Escorza-22201128
</p>

<p>
 05/03/2026
</p>
<a href="../web-design-boostrap/index.html">
Ir a versión Bootstrap
</a>
</footer>


</body>
</html>
